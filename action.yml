name: 'Zip Release'
author: 'step-security'
branding:
  icon: 'archive'
  color: 'yellow'
description: 'Make an archive from specified files and directories as workflow action'
inputs:
  filename:
    description: 'Filename for archive'
    required: true
    default: 'release.zip'
  path:
    description: 'Base path for archive files'
    default: '.'
    required: false
  directory:
    description: 'Working directory before zipping'
    default: '.'
    required: false
  exclusions:
    description: 'List of excluded files / directories'
    default: ''
    required: false
  recursive_exclusions:
    description: 'List of excluded files / directories with recursive wildcards (only applies on Windows with `zip` type)'
    default: ''
    required: false
  custom:
    description: 'Provide any custom parameters to the zipping command'
    default: ''
    required: false
  type:
    description: 'Tool to use for archiving'
    default: 'zip'
    required: false
  command:
    description: 'An extra command that will run before zipping'
    default: ''
    required: false
runs:
  using: composite
  steps:
    - name: Subscription check
      env:
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        UPSTREAM="TheDoctor0/zip-release"
        ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
        DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

        echo ""
        echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
        echo "Secure drop-in replacement for $UPSTREAM"
        if [ "$REPO_PRIVATE" = "false" ]; then
          echo -e "\033[32m✓ Free for public repositories\033[0m"
        fi
        echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
        echo ""

        if [ "$REPO_PRIVATE" != "false" ]; then
          SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

          if [ "$SERVER_URL" != "https://github.com" ]; then
            BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
          else
            BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
          fi

          API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

          RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Timeout or API not reachable. Continuing to next step."
          elif [ "$RESPONSE" = "403" ]; then
            echo -e "::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m"
            echo -e "::error::\033[31mLearn how to enable a subscription: $DOCS_URL\033[0m"
            exit 1
          fi
        fi
      shell: bash
    - shell: bash
      env:
        INPUT_FILENAME: ${{ inputs.filename }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_EXCLUSIONS: ${{ inputs.exclusions }}
        INPUT_RECURSIVE_EXCLUSIONS: ${{ inputs.recursive_exclusions }}
        INPUT_CUSTOM: ${{ inputs.custom }}
        INPUT_TYPE: ${{ inputs.type }}
        INPUT_COMMAND: ${{ inputs.command }}
      run: $GITHUB_ACTION_PATH/entrypoint.sh

